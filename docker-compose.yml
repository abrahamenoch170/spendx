version: '3.8'

services:
  valhalla:
    image: ghcr.io/gisops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    volumes:
      - ./custom_data:/custom_data
    environment:
      - tile_extract=https://download.geofabrik.de/europe/germany/berlin-latest.osm.pbf
      - build_elevation=True
      - build_admins=True
      - build_timezones=True

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  supabase:
    image: supabase/postgres:15.1.0.117
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: your-super-secret-and-long-postgres-password
    volumes:
      - supabase_db:/var/lib/postgresql/data

volumes:
  redis_data:
  supabase_db:
